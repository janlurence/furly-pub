    <circle cx="300" cy="252" r="14"/>
  </g>
  <!-- nose -->
  <path d="M244 296 L268 296 L256 312 Z" fill="#EE7B4D"/>
  <!-- whiskers -->
  <g stroke="#2D2A26" stroke-width="8" stroke-linecap="round">
    <line x1="150" y1="290" x2="106" y2="282"/>
    <line x1="150" y1="312" x2="108" y2="322"/>
    <line x1="362" y1="290" x2="406" y2="282"/>
    <line x1="362" y1="312" x2="404" y2="322"/>
  </g>
</svg>
