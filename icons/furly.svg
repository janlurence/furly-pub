<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="120" fill="#EE7B4D"/>
  <!-- cat face -->
  <g fill="#FDF8F3">
    <!-- ears -->
    <path d="M148 178 L128 96 L208 138 Z"/>
    <path d="M364 178 L384 96 L304 138 Z"/>
    <!-- head -->
    <circle cx="256" cy="268" r="128"/>
  </g>
  <!-- eyes -->
